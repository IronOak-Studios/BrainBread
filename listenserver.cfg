// Use this file to configure your LISTEN server. 
// This config file is executed every time the server changes levels.

// Default for BrainBread
// maxplayers 12

// disable autoaim
sv_aim 0

// no lan server
sv_lan 0

// disable clients' ability to pause the server
pausable 0

// default server name.
// hostname "BrainBread v1.3.37 Server"

// maximum client movement speed (1000 for BB)
sv_maxspeed 1000

// Max map duration in minutes, won't interrupt an active round (0 = no limit)
mp_timelimit 30

sv_cheats 0

// Turn off friendlyfire
// mp_friendlyfire 0

// Allow flashlights
// mp_flashlight 1

// Enable map and variable voting
// sv_mapvote 1
// sv_varvote 0

// Round duration in seconds, countdown starts when a player joins
// sv_roundtimelimit 1000

// Experience settings
sv_expperlevel 150
sv_exppotence 2
// level = ( exp / sv_expperlevel ) ^ ( 1 / sv_exppotence )
//
// sv_expperlevel 2500 and sv_exppotence 1 would need approx. the same amount
// of exp for level 23 but every level requires the same amount of exp

// max level (-1 = no limit)
// sv_maxlevel -1
// Save exp for 24h. (0 = don't save exp, -1 = save exp forever, X = save exp for X hours)
// sv_savexp 24

// Difficulty affects respawn times, HP, damage, speed. 1 = 100%
// sv_difficulty 1

// Save exp info in this file (/brainbread/<file>, relative to working directory)
// Interpreted as an SQLite database if it ends with ".sqlite"
sv_playerinfofile "players.sqlite"

// Global max amount of gibs/zombies. Values too high produce ED_Alloc error
// sv_gibcount 20
// sv_zombiecount 120

// Zombie AI behavior. 0 = classic, 1 = new sidestep, 2 = new sidestep + clip (default: 2)
// sv_zombie_behavior 2
// Max zombie drop height (for new clip + drop behavior)
// sv_zombie_drop_height 100
// Zombie turning speed. Higher = faster turns (default: 10)
// sv_zombie_yawspeed 20
// Zombie max lifetime in seconds. 0 = infinite (default: 60)
// sv_zombie_lifetime 60
// Max obstacle height zombies can walk over (engine stepsize override). Noop when equal to sv_stepsize (default: 18)
// sv_zombie_stepsize 18
// Max obstacle thickness (units) a stuck zombie can clip through (default: 45)
// sv_zombie_clip_distance 45
// Wall angle threshold below which zombies slide instead of walking into the wall (default: 80)
// sv_zombie_slide_angle 80

// Gameover conditions (0 = unlimited)
mp_teamscorelimit 0
mp_fraglimit 0
